entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    watch: true
    exposedByDefault: false
    network: "central-net"
  file:
    directory: "/etc/traefik/dynamic"
    watch: true


tls:
  stores:
    default:
      defaultCertificate:
        certFile: "/etc/traefik/certs/origin.pem"
        keyFile: "/etc/traefik/certs/origin.key"

api:
  dashboard: true
  insecure: false

accessLog: {}

log:
  level: INFO
