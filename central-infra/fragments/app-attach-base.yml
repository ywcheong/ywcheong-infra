services:
  # Base app attachment fragment for Compose `extends` consumers.
  app-server:
    # Attach app service to the shared infrastructure network.
    networks:
      - central-net
    # Default resource limits for apps (override in compose.base.yml if needed)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    # SSOT Traefik labels for app subdomain routing and TLS.
    labels:
      # Enable Traefik for this service.
      - "traefik.enable=true"
      # HTTPS router for <app>.app.<base-domain>.
      - "traefik.http.routers.${APP_NAME}.rule=Host(`${APP_NAME}.app.${BASE_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}.tls=true"
      # Target internal application port.
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=${APP_PORT}"
      # HTTP router for redirecting plain HTTP to HTTPS.
      - "traefik.http.routers.${APP_NAME}-http.rule=Host(`${APP_NAME}.app.${BASE_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}-http.entrypoints=web"
      - "traefik.http.routers.${APP_NAME}-http.middlewares=redirect-to-https@file"

# Networks must be defined in the consumer compose file, not here.
# extends does not inherit top-level networks section.
# Resource limits can be overridden in compose.base.yml:
#   deploy:
#     resources:
#       limits:
#         memory: 1G
