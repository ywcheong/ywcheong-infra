services:
  traefik:
    image: traefik:latest
    container_name: central-traefik
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik:/etc/traefik
      - ./traefik/certs:/etc/traefik/certs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - central-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${BASE_DOMAIN}`)
      - traefik.http.routers.traefik-dashboard.entrypoints=websecure
      - traefik.http.routers.traefik-dashboard.tls=true
      - traefik.http.routers.traefik-dashboard.service=api@internal
      - traefik.http.routers.traefik-dashboard.middlewares=dashboard-auth@file
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  central-maintenance:
    image: nginx:alpine
    container_name: central-maintenance
    volumes:
      - ./maintenance:/usr/share/nginx/html:ro
    networks:
      - central-net
    labels:
      - traefik.enable=true
      - traefik.http.services.central-maintenance.loadbalancer.server.port=80
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

  central-mysql:
    image: mysql:8.0
    container_name: central-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - central-net
    labels:
      - traefik.enable=false
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: central-mysql-exporter
    environment:
      DATA_SOURCE_NAME: "root:${MYSQL_ROOT_PASSWORD}@(central-mysql:3306)/"
    networks:
      - central-net
    labels:
      - traefik.enable=false
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  node-exporter:
    image: prom/node-exporter:latest
    container_name: central-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
    networks:
      - central-net
    labels:
      - traefik.enable=false
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  prometheus:
    image: prom/prometheus:latest
    container_name: central-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - central-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.central-prometheus.rule=Host(`central.${BASE_DOMAIN}`) && PathPrefix(`/prometheus`)
      - traefik.http.routers.central-prometheus.entrypoints=websecure
      - traefik.http.routers.central-prometheus.tls=true
      - traefik.http.routers.central-prometheus.middlewares=central-prometheus-stripprefix
      - traefik.http.middlewares.central-prometheus-stripprefix.stripprefix.prefixes=/prometheus
      - traefik.http.services.central-prometheus.loadbalancer.server.port=9090
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    container_name: central-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
      GF_SERVER_ROOT_URL: https://central.${BASE_DOMAIN}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - central-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.central-grafana.rule=Host(`central.${BASE_DOMAIN}`) && PathPrefix(`/grafana`)
      - traefik.http.routers.central-grafana.entrypoints=websecure
      - traefik.http.routers.central-grafana.tls=true
      - traefik.http.services.central-grafana.loadbalancer.server.port=3000
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  loki:
    image: grafana/loki:latest
    container_name: central-loki
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - central-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  promtail:
    image: grafana/promtail:latest
    container_name: central-promtail
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - central-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

networks:
  central-net:
    external: true

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:
  loki-data:
